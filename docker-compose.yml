services:
  postgres:
    image: postgres:16-alpine
    container_name: sendro-postgres
    environment:
      POSTGRES_DB: sendro
      POSTGRES_USER: sendro
      POSTGRES_PASSWORD: sendro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sendro -d sendro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
